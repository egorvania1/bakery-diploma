{% extends "base.html" %}
{% load static %}
{% block title %}
    Меню
{% endblock title %}
{% block content %}
    <div class="container ps-3 p-2">
        <div class="row row-cols-4">
            {% for item in items %}
                <div class="col pt-2">
                    <div class="card">
                        <div class="ratio ratio-1x1">
                            <img height="200"
                                 width="200"
                                 {% if item.image %}
                                    src="{{ item.image.url }}" 
                                 {% else %}
                                    src="{% static 'assets/img/item.png' %}"
                                 {% endif %}
                                 class="p-2 card-img-top object-fit-cover"
                                 alt="...">
                        </div>
                        <div class="card-body">
                            <h6 class="card-subtitle">{{ item.name }}</h6>
                            <h5 class="card-title">{{ item.price }} руб.</h5>
                            <a href="{% url 'item_info' pk=item.pk %}" class="stretched-link"></a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock content %}
