{% load static %}

<header>
  <div class="container d-flex justify-content-between">
    <div class="p-2">
      <a class="navbar-brand" href="{% url 'menu' %}">
        <img src="{% static 'assets/img/logo.png' %}"
             alt="Logo"
             width="220"
             height="120">
      </a>
    </div>
    <div class="d-flex align-items-center">
      {% if user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button class="btn btn-secondary rounded-5" type="submit">Выход</button>
        </form>
      {% else %}
        <a class="btn btn-secondary" href="{% url 'login' %}">Вход</a>
      {% endif %}
    </div>
  </div>
</header>
<nav class="navbar bg-body-tertiary">
  <div class="container">
    <ul class="nav me-auto">
      <li class="nav-item">
        <a class="nav-link text-black" href="{% url 'menu' %}">Меню</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-black" href="{% url 'about' %}">О нас</a>
      </li>
    </ul>
    <div>
      <a class="btn btn-secondary rounded-5" href="{% url 'orders' %}">Заказы 0</a>
      <a class="btn btn-secondary rounded-5" href="{% url 'cart' %}">Корзина 0</a>
    </div>
  </div>
</nav>
