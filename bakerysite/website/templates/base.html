        <meta name="keywords" content="Bakery, Diploma">

            {% block title %}

            {% endblock title %}

              crossorigin="anonymous"-->

              href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

            <link rel="stylesheet"
