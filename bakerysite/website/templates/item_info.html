{% extends "base.html" %}
{% block title %}
    Item
{% endblock title %}
{% block content %}
    <div class="container ps-3 p-2">
        <div class="row">
            <div class="col">{{ item.name }}</div>
            <div class="col">
                <ul class="nav nav-tabs" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active"
                                id="desc-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#desc-tab-pane"
                                type="button"
                                role="tab"
                                aria-controls="desc-tab-pane"
                                aria-selected="true">Описание</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link"
                                id="cont-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#cont-tab-pane"
                                type="button"
                                role="tab"
                                aria-controls="cont-tab-pane"
                                aria-selected="false">Состав</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link"
                                id="cust-tab"
                                data-bs-toggle="tab"
                                data-bs-target="#cust-tab-pane"
                                type="button"
                                role="tab"
                                aria-controls="cust-tab-pane"
                                aria-selected="false">Компоненты</button>
                    </li>
                </ul>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <img src="{{ item.image.url }}" class="p-2 object-fit-cover" alt="...">
            </div>
            <div class="col">
                <div class="tab-content" id="myTabContent">
                    <div class="tab-pane fade show active"
                         id="desc-tab-pane"
                         role="tabpanel"
                         aria-labelledby="desc-tab"
                         tabindex="0">{{ item.description }}</div>
                    <div class="tab-pane fade"
                         id="cont-tab-pane"
                         role="tabpanel"
                         aria-labelledby="cont-tab"
                         tabindex="0">{{ item.contents }}</div>
                    <div class="tab-pane fade"
                         id="cust-tab-pane"
                         role="tabpanel"
                         aria-labelledby="cust-tab"
                         tabindex="0">...</div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col"></div>
            <div class="col">Column</div>
        </div>
    </div>
{% endblock content %}
