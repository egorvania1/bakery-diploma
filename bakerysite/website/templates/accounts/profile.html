{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}
    Профиль
{% endblock title %}
{% block content %}
    <div class="container ps-3 p-2">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button class="btn btn-secondary rounded-5" type="submit">Изменить</button>
        </form>
        <form method="post" action="{% url 'accounts:logout' %}">
            {% csrf_token %}
            <button class="btn btn-outline-secondary rounded-5" type="submit">Выход</button>
        </form>
    </div>
{% endblock content %}
