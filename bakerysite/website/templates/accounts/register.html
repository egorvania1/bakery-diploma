{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}
    Регистрация
{% endblock title %}
{% block content %}
    <div class="container ps-3 p-2">
        <form method="post">
            {% csrf_token %}
            {{ user_form|crispy }}
            {{ profile_form|crispy }}
            <button class="btn btn-secondary rounded-5" type="submit" name='register' value='register'>Зарегистрироваться</button>
        </form>
        {% for message in messages %}
            <div class="alert alert-success">
                <a class="close" href="#" data-dismiss="alert">×</a>
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endblock content %}
